<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — HealthMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; }
    .admin-login-card { background: #fff; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="50">
        <h4 class="mt-3 fw-bold">Admin Portal</h4>
        <p class="text-muted small">Enter your secure credentials</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{cat}} py-2 small d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-circle"></i> {{msg}}
        </div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="hm-label">Admin Username</label>
        <input type="text" name="username" class="hm-input" required autofocus placeholder="username">
      </div>
      <div class="mb-4">
        <label class="hm-label">Password</label>
        <input type="password" name="password" class="hm-input" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-hm-primary w-100 py-3">
        Authorize Access <i class="bi bi-shield-lock-fill ms-2"></i>
      </button>
    </form>
    
    <div class="text-center mt-4 pt-3 border-top">
        <a href="{{ url_for('login') }}" class="text-muted small">← Return to Public Site</a>
    </div>
  </div>
</body>
</html>
